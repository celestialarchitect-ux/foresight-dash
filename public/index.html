<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FORESIGHT // COMMAND CENTER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --bg-card: #111111;
  --bg-dark: #1a1a1a;
  --text: #e8e8e8;
  --text-dim: #888;
  --border: #e8e8e8;
  --green: #00ff66;
  --red: #ff3344;
  --shadow: 4px 4px 0px #222;
  --font: 'Press Start 2P', monospace;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}

html { font-size: 10px; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
  -webkit-font-smoothing: none;
  -moz-osx-font-smoothing: unset;
  image-rendering: pixelated;
}

/* === CRT SCANLINE OVERLAY === */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.02) 2px,
    rgba(255,255,255,0.02) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* === SCREEN FLICKER === */
@keyframes flicker {
  0%, 100% { opacity: 1; }
  92% { opacity: 1; }
  93% { opacity: 0.97; }
  94% { opacity: 1; }
  96% { opacity: 0.98; }
  97% { opacity: 1; }
}
body { animation: flicker 4s infinite; }

/* === CRT POWER-ON === */
@keyframes powerOn {
  0% { transform: scaleY(0.005) scaleX(0.3); filter: brightness(10); opacity: 0; }
  15% { transform: scaleY(0.005) scaleX(1); filter: brightness(5); opacity: 1; }
  30% { transform: scaleY(0.1) scaleX(1); filter: brightness(3); }
  50% { transform: scaleY(1) scaleX(1); filter: brightness(2); }
  100% { transform: scaleY(1) scaleX(1); filter: brightness(1); }
}
#app { animation: powerOn 0.9s ease-out forwards; transform-origin: center center; }

/* === FLASH EFFECTS === */
@keyframes tradeFlash {
  0% { box-shadow: inset 0 0 0 0 transparent; }
  15% { box-shadow: inset 0 0 80px 20px rgba(255,255,255,0.15); }
  100% { box-shadow: inset 0 0 0 0 transparent; }
}
@keyframes profitFlash {
  0% { box-shadow: inset 0 0 0 0 transparent; }
  15% { box-shadow: inset 0 0 60px 10px rgba(0,170,0,0.12); }
  100% { box-shadow: inset 0 0 0 0 transparent; }
}
@keyframes lossFlash {
  0% { box-shadow: inset 0 0 0 0 transparent; }
  15% { box-shadow: inset 0 0 60px 10px rgba(204,0,0,0.12); }
  100% { box-shadow: inset 0 0 0 0 transparent; }
}
body.flash-trade { animation: tradeFlash 0.35s ease-out, flicker 4s infinite; }
body.flash-profit { animation: profitFlash 0.45s ease-out, flicker 4s infinite; }
body.flash-loss { animation: lossFlash 0.45s ease-out, flicker 4s infinite; }

/* === FLOATING PNL TEXT === */
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-70px) scale(1.3); }
}
.float-pnl {
  position: fixed;
  font-family: var(--font);
  font-size: 1.6rem;
  pointer-events: none;
  z-index: 9998;
  animation: floatUp 1.3s ease-out forwards;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
}

/* === BLINK === */
@keyframes blink { 0%,49%{opacity:1}50%,100%{opacity:0} }
.blink { animation: blink 1s steps(1) infinite; }

/* === PIXEL BORDER PULSE === */
@keyframes borderPulse { 0%,100%{border-color:#e8e8e8}50%{border-color:#555} }
.active-card { animation: borderPulse 1.8s steps(2) infinite; }

/* === PRICE HIGHLIGHT === */
@keyframes priceHL { 0%{background:rgba(255,255,255,0.1)}100%{background:transparent} }
.price-hl { animation: priceHL 0.5s ease-out; }

/* === CONTAINER === */
.container { max-width: 1200px; margin: 0 auto; padding: 0 8px; }

/* ============================== */
/*           TOP BAR              */
/* ============================== */
.topbar {
  border-bottom: 3px solid var(--border);
  background: var(--bg-card);
  padding: 10px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 3px 0 var(--bg-dark);
}
.topbar-title { font-size: 1.4rem; letter-spacing: 3px; white-space: nowrap; }
.topbar-sub { font-size: 0.5rem; color: var(--text-dim); letter-spacing: 1px; display: block; margin-top: 2px; }
.topbar-right { display: flex; align-items: center; gap: 12px; font-size: 0.8rem; }
.status-dot {
  width: 8px; height: 8px;
  background: var(--green);
  display: inline-block;
  border: 1px solid var(--border);
}
.status-dot.offline { background: var(--red); }
.clock { font-size: 0.8rem; white-space: nowrap; }
.btn-fs {
  font-family: var(--font);
  font-size: 0.65rem;
  background: var(--text);
  color: var(--bg);
  border: 2px solid var(--border);
  padding: 6px 10px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: 2px 2px 0 #ccc;
}
.btn-fs:active { transform: translate(2px,2px); box-shadow: none; }

/* OVERRIDE BUTTONS */
.obtn {
  font-family: var(--font);
  font-size: 0.6rem;
  padding: 8px 12px;
  border: 2px solid var(--border);
  cursor: pointer;
  letter-spacing: 1px;
  box-shadow: 2px 2px 0 #222;
  transition: all 0.1s;
}
.obtn:active { transform: translate(2px,2px); box-shadow: none; }
.obtn-long { background: var(--green); color: #000; }
.obtn-short { background: var(--red); color: #fff; }
.obtn-close { background: #333; color: var(--text); border-color: var(--red); }

/* ============================== */
/*           CARD                 */
/* ============================== */
.card {
  background: var(--bg-card);
  border: 2px solid var(--border);
  box-shadow: var(--shadow);
  margin-bottom: 10px;
}
.card-header {
  background: var(--text);
  color: var(--bg);
  font-size: 0.75rem;
  padding: 7px 10px;
  letter-spacing: 2px;
  border-bottom: 2px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.card-body { padding: 10px; }

/* ============================== */
/*         HERO STATS             */
/* ============================== */
.hero {
  text-align: center;
  padding: 24px 10px 20px;
  border-bottom: 3px solid var(--border);
  background: var(--bg-card);
  margin-bottom: 10px;
  box-shadow: 0 3px 0 var(--bg-dark);
  position: relative;
}
.hero-label { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 8px; letter-spacing: 4px; }
.hero-value { font-size: 3rem; line-height: 1.3; margin-bottom: 10px; word-break: break-all; }
.hero-bar {
  width: 100%; height: 4px;
  background: var(--bg-dark);
  margin: 8px auto 12px;
  max-width: 320px;
  border: 1px solid #ccc;
  position: relative;
}
.hero-bar-fill {
  height: 100%;
  background: var(--text);
  transition: width 0.5s;
}
.hero-sub {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.hero-sub-item { text-align: center; min-width: 80px; }
.hero-sub-item .label { font-size: 0.55rem; color: var(--text-dim); margin-bottom: 4px; letter-spacing: 1px; }
.hero-sub-item .value { font-size: 1.3rem; }
.pnl-pos { color: var(--green); }
.pnl-neg { color: var(--red); }

/* ============================== */
/*         MARKET TICKER          */
/* ============================== */
.ticker-wrap {
  overflow: hidden;
  border-top: 2px solid var(--border);
  border-bottom: 2px solid var(--border);
  background: var(--text);
  color: var(--bg);
  padding: 9px 0;
  margin-bottom: 10px;
  white-space: nowrap;
}
@keyframes tickerScroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.ticker-track {
  display: inline-block;
  animation: tickerScroll 22s linear infinite;
  font-size: 0.85rem;
  letter-spacing: 1px;
}
.ticker-item { display: inline-block; margin-right: 28px; }
.ticker-sym { color: #999; }
.ticker-price { color: #fff; }
.ticker-sep { color: #444; margin: 0 6px; }

/* ============================== */
/*          BOT GRID              */
/* ============================== */
.bot-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin-bottom: 10px;
  padding: 0 8px;
}
.bot-card .card-body { font-size: 0.75rem; line-height: 2.1; }
.bot-stat {
  display: flex;
  justify-content: space-between;
  border-bottom: 1px dashed #ccc;
  padding: 2px 0;
}
.bot-stat:last-child { border-bottom: none; }
.bot-position {
  margin-top: 8px;
  padding: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  font-size: 0.65rem;
  line-height: 2;
}
.pos-lbl { color: var(--text-dim); font-size: 0.55rem; letter-spacing: 1px; }
.bot-winbar {
  width: 100%; height: 6px;
  background: var(--bg-dark);
  border: 1px solid #bbb;
  margin-top: 4px;
}
.bot-winbar-fill { height: 100%; background: var(--green); transition: width 0.4s; }

/* ============================== */
/*        POSITIONS PANEL         */
/* ============================== */
.positions-panel { padding: 0 8px; margin-bottom: 10px; }
.pos-row {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 6px;
  padding: 8px 6px;
  font-size: 0.65rem;
  line-height: 2;
  border-bottom: 1px dashed #ccc;
}
.pos-row:last-child { border-bottom: none; }

/* ============================== */
/*          TRADE FEED            */
/* ============================== */
.trade-feed { padding: 0 8px; margin-bottom: 10px; }
.trade-list {
  max-height: 240px;
  overflow-y: auto;
  font-size: 0.65rem;
  line-height: 2.4;
  scrollbar-width: thin;
}
.trade-list::-webkit-scrollbar { width: 6px; }
.trade-list::-webkit-scrollbar-track { background: var(--bg-dark); }
.trade-list::-webkit-scrollbar-thumb { background: var(--text); }
.trade-row {
  display: flex;
  gap: 8px;
  border-bottom: 1px solid #e0e0e0;
  padding: 3px 6px;
  align-items: center;
  white-space: nowrap;
}
.trade-row:nth-child(odd) { background: rgba(0,0,0,0.02); }
.trade-time { color: var(--text-dim); min-width: 60px; }
.trade-bot { font-weight: bold; min-width: 45px; }
.trade-side { min-width: 32px; text-transform: uppercase; }
.trade-side.buy { color: var(--green); }
.trade-side.sell { color: var(--red); }
.trade-sym { color: var(--text-dim); min-width: 50px; }
.trade-price { min-width: 55px; }
.trade-fee { color: var(--text-dim); }
.trade-rage { color: var(--red); }
@keyframes rowSlideIn { 0%{opacity:0;transform:translateX(-10px)}100%{opacity:1;transform:translateX(0)} }
.trade-new { background: rgba(0,0,0,0.06) !important; animation: rowSlideIn 0.3s ease-out; }
.cursor-blink::after { content: '_'; animation: blink 0.8s steps(1) infinite; }

/* ============================== */
/*         STATUS BAR             */
/* ============================== */
.statusbar {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  background: var(--text);
  color: var(--bg);
  border-top: 3px solid var(--border);
  padding: 8px 12px;
  padding-bottom: calc(8px + var(--safe-bottom));
  font-size: 0.6rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  z-index: 100;
  letter-spacing: 1px;
}
.sb-item { display: flex; align-items: center; gap: 4px; }
.rage-on { color: var(--red); font-weight: bold; }
.rage-off { color: #666; }
.paused-on { color: #ffaa00; }
.sb-sep { color: #444; }

/* ============================== */
/*         RESPONSIVE             */
/* ============================== */
@media (min-width: 600px) {
  .bot-grid { grid-template-columns: 1fr 1fr; }
  .hero-value { font-size: 4.2rem; }
  .container { padding: 0 16px; }
  .hero-sub { gap: 24px; }
}
@media (min-width: 960px) {
  .bot-grid { grid-template-columns: 1fr 1fr 1fr; }
  .hero-value { font-size: 5.2rem; }
  .hero { padding: 32px 20px 28px; }
  .trade-list { max-height: 320px; }
  .hero-sub-item .value { font-size: 1.5rem; }
}

/* === BOTTOM PADDING FOR FIXED BAR === */
#app { padding-bottom: 52px; }

/* === SELECTION === */
body { -webkit-user-select: none; user-select: none; }
.trade-list, .hero-value { -webkit-user-select: text; user-select: text; }

/* === PIXEL DECORATIONS === */
.pixel-corner {
  position: absolute;
  width: 6px; height: 6px;
  background: var(--text);
}
.pixel-corner.tl { top: -3px; left: -3px; }
.pixel-corner.tr { top: -3px; right: -3px; }
.pixel-corner.bl { bottom: -3px; left: -3px; }
.pixel-corner.br { bottom: -3px; right: -3px; }
</style>
</head>
<body>
<div id="app">

  <!-- ========== TOP BAR ========== -->
  <div class="topbar">
    <div>
      <div class="topbar-title">FORESIGHT</div>
      <span class="topbar-sub">COMMAND CENTER v2</span>
    </div>
    <div class="topbar-right">
      <span class="status-dot blink" id="statusDot"></span>
      <span class="clock" id="clock">--:--:--</span>
      <button class="btn-fs" onclick="toggleFs()">[ ]</button>
    </div>
  </div>

  <!-- ========== HERO STATS ========== -->
  <div class="hero" id="heroSection">
    <div class="hero-label">ACCOUNT VALUE</div>
    <div class="hero-value" id="heroValue">$---.-</div>
    <div class="hero-bar"><div class="hero-bar-fill" id="heroBar" style="width:100%"></div></div>
    <div class="hero-sub">
      <div class="hero-sub-item">
        <div class="label">TOTAL P&amp;L</div>
        <div class="value" id="heroPnl">---</div>
      </div>
      <div class="hero-sub-item">
        <div class="label">UNREALIZED</div>
        <div class="value" id="heroUnreal">---</div>
      </div>
      <div class="hero-sub-item">
        <div class="label">OPEN POS</div>
        <div class="value" id="heroPos">0</div>
      </div>
      <div class="hero-sub-item">
        <div class="label">TRADES</div>
        <div class="value" id="heroTrades">0</div>
      </div>
      <div class="hero-sub-item">
        <div class="label">LEVERAGE</div>
        <div class="value" id="heroLev">--x</div>
      </div>
    </div>
  </div>

  <!-- ========== MARKET TICKER ========== -->
  <div class="ticker-wrap">
    <div class="ticker-track" id="ticker">&nbsp; LOADING MARKET DATA ... &nbsp;</div>
  </div>

  <div class="container">

    <!-- ========== BOT STATUS ========== -->
    <div class="bot-grid" id="botGrid"></div>

    <!-- ========== OPEN POSITIONS ========== -->
    <div class="positions-panel" id="posPanel" style="display:none;">
      <div class="card" style="position:relative;">
        <div class="card-header"><span>&#9654; OPEN POSITIONS</span></div>
        <div class="card-body" id="posBody"></div>
      </div>
    </div>

    <!-- ========== TRADE FEED ========== -->
    <div class="trade-feed">
      <div class="card">
        <div class="card-header">
          <span>TRADE LOG <span class="cursor-blink"></span></span>
          <span id="tradeCount" style="font-size:0.55rem;color:#888;">0 ENTRIES</span>
        </div>
        <div class="card-body" style="padding:0;">
          <div class="trade-list" id="tradeList">
            <div style="padding:12px;color:#888;font-size:0.65rem;text-align:center;">AWAITING SIGNAL...</div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- ========== OVERRIDE PANEL ========== -->
  <div class="card" style="margin:0 8px 10px">
    <div class="card-header">SIGNAL OVERRIDE <span style="font-size:0.5rem;color:#888">MANUAL CONTROL</span></div>
    <div class="card-body" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center">
      <button class="obtn obtn-long" onclick="override('open','BTC','long')">LONG BTC</button>
      <button class="obtn obtn-short" onclick="override('open','BTC','short')">SHORT BTC</button>
      <button class="obtn obtn-long" onclick="override('open','ETH','long')">LONG ETH</button>
      <button class="obtn obtn-short" onclick="override('open','ETH','short')">SHORT ETH</button>
      <button class="obtn obtn-long" onclick="override('open','SOL','long')">LONG SOL</button>
      <button class="obtn obtn-short" onclick="override('open','SOL','short')">SHORT SOL</button>
      <button class="obtn obtn-close" onclick="override('close_all','','')">CLOSE ALL</button>
    </div>
  </div>

  <!-- ========== STATUS BAR ========== -->
  <div class="statusbar">
    <div class="sb-item"><span id="rageStatus" class="rage-off">RAGE:OFF</span></div>
    <span class="sb-sep">|</span>
    <div class="sb-item"><span>D.PNL:</span><span id="dailyPnl">---</span></div>
    <span class="sb-sep">|</span>
    <div class="sb-item"><span>LOSSES:</span><span id="consecLoss">0</span></div>
    <span class="sb-sep">|</span>
    <div class="sb-item"><span>KILL:</span><span id="killSwitch">---</span></div>
    <div class="sb-item" id="pauseWrap" style="display:none;"><span class="paused-on blink">PAUSED</span></div>
    <span class="sb-sep">|</span>
    <div class="sb-item"><span id="platform">---</span></div>
    <div class="sb-item"><span id="tickNum" style="color:#666;">T:0</span></div>
  </div>

</div>

<script>
const API_BASE = 'http://192.168.4.45:8080';
const POLL_MS = 1500;

let prevState = null;
let prevTradeCount = 0;
let connected = false;
let prevPrices = {};

// ===== CLOCK =====
function updateClock() {
  const d = new Date();
  document.getElementById('clock').textContent =
    String(d.getHours()).padStart(2,'0') + ':' +
    String(d.getMinutes()).padStart(2,'0') + ':' +
    String(d.getSeconds()).padStart(2,'0');
}
setInterval(updateClock, 1000);
updateClock();

// ===== FULLSCREEN =====
function toggleFs() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
}

// ===== FORMATTERS =====
function fmt(n) {
  if (n == null || isNaN(n)) return '---';
  return (n >= 0 ? '+$' : '-$') + Math.abs(n).toFixed(2);
}
function fmtUsd(n) {
  if (n == null || isNaN(n)) return '$---';
  return '$' + n.toFixed(2);
}
function pc(n) {
  return n == null ? '' : n >= 0 ? 'pnl-pos' : 'pnl-neg';
}
function fmtPrice(p) {
  if (p >= 10000) return p.toLocaleString('en-US', {maximumFractionDigits:0});
  if (p >= 1) return p.toFixed(2);
  return p.toFixed(4);
}

// ===== FLOATING PNL TEXT =====
function spawnFloat(text, positive) {
  const el = document.createElement('div');
  el.className = 'float-pnl';
  el.textContent = text;
  el.style.color = positive ? 'var(--green)' : 'var(--red)';
  el.style.left = (25 + Math.random() * 50) + '%';
  el.style.top = '28%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1400);
}

// ===== SCREEN FLASH =====
function flash(type) {
  document.body.classList.remove('flash-trade','flash-profit','flash-loss');
  void document.body.offsetWidth;
  document.body.classList.add('flash-' + type);
  setTimeout(() => document.body.classList.remove('flash-' + type), 500);
}

// ===== RENDER =====
function render(s) {
  // Connection status
  document.getElementById('statusDot').classList.remove('offline');
  connected = true;

  // --- HERO ---
  const bal = s.current_usd != null ? s.current_usd : s.real_balance;
  document.getElementById('heroValue').textContent = fmtUsd(bal);

  const pnlEl = document.getElementById('heroPnl');
  pnlEl.textContent = fmt(s.total_pnl);
  pnlEl.className = 'value ' + pc(s.total_pnl);

  const ueEl = document.getElementById('heroUnreal');
  ueEl.textContent = fmt(s.unrealized_pnl);
  ueEl.className = 'value ' + pc(s.unrealized_pnl);

  const posCount = s.positions ? Object.keys(s.positions).length : 0;
  document.getElementById('heroPos').textContent = posCount;
  document.getElementById('heroTrades').textContent = s.total_trades || 0;
  document.getElementById('heroLev').textContent = (s.leverage || '--') + 'x';

  // Health bar: ratio of current to starting
  if (s.starting_balance && bal) {
    const pct = Math.max(0, Math.min(100, (bal / s.starting_balance) * 100));
    document.getElementById('heroBar').style.width = pct + '%';
    document.getElementById('heroBar').style.background =
      pct > 80 ? 'var(--text)' : pct > 50 ? '#888' : 'var(--red)';
  }

  // --- TICKER ---
  renderTicker(s.prices || {});

  // --- BOTS ---
  renderBots(s.bots || {}, s.positions || {});

  // --- POSITIONS ---
  renderPositions(s.positions || {});

  // --- TRADES ---
  renderTrades(s.recent_trades || []);

  // --- STATUS BAR ---
  const rageEl = document.getElementById('rageStatus');
  if (s.rage_mode) {
    rageEl.textContent = 'RAGE:ON';
    rageEl.className = 'rage-on blink';
  } else {
    rageEl.textContent = 'RAGE:OFF';
    rageEl.className = 'rage-off';
  }

  const dpEl = document.getElementById('dailyPnl');
  dpEl.textContent = fmt(s.daily_pnl);
  dpEl.className = pc(s.daily_pnl);

  document.getElementById('consecLoss').textContent = s.consecutive_losses || 0;
  document.getElementById('killSwitch').textContent = s.kill_switch ? fmtUsd(s.kill_switch) : '---';
  document.getElementById('pauseWrap').style.display = s.daily_paused ? '' : 'none';
  document.getElementById('platform').textContent = s.platform || '---';
  document.getElementById('tickNum').textContent = 'T:' + (s.tick || 0);

  // --- FLASH / FLOAT EFFECTS ---
  const curTC = (s.recent_trades || []).length;
  if (prevState && curTC > prevTradeCount) {
    flash('trade');
  }
  prevTradeCount = curTC;

  if (prevState && s.total_pnl != null && prevState.total_pnl != null) {
    const diff = s.total_pnl - prevState.total_pnl;
    if (Math.abs(diff) > 0.01) {
      const win = diff > 0;
      flash(win ? 'profit' : 'loss');
      spawnFloat((win ? '+' : '') + '$' + diff.toFixed(2), win);
    }
  }

  prevState = JSON.parse(JSON.stringify(s));
}

// ===== TICKER =====
function renderTicker(prices) {
  const keys = Object.keys(prices);
  if (!keys.length) return;
  const items = keys.map(sym => {
    const p = prices[sym];
    const changed = prevPrices[sym] !== undefined && prevPrices[sym] !== p;
    return '<span class="ticker-item' + (changed ? ' price-hl' : '') + '">' +
      '<span class="ticker-sym">' + sym + '</span>' +
      '<span class="ticker-sep">&bull;</span>' +
      '<span class="ticker-price">$' + fmtPrice(p) + '</span></span>';
  }).join('');
  document.getElementById('ticker').innerHTML = items + items;
  prevPrices = Object.assign({}, prices);
}

// ===== BOTS =====
function renderBots(bots, positions) {
  const grid = document.getElementById('botGrid');
  const names = Object.keys(bots);
  if (!names.length) { grid.innerHTML = ''; return; }

  let html = '';
  names.forEach(name => {
    const b = bots[name];
    let posHtml = '';
    let isActive = false;

    Object.entries(positions).forEach(([key, pos]) => {
      if (key.startsWith(name + ':')) {
        isActive = true;
        const sym = key.split(':')[1] || '?';
        const sc = pos.side === 'buy' ? 'pnl-pos' : 'pnl-neg';
        posHtml += '<div class="bot-position">' +
          '<div><span class="pos-lbl">POS </span><span class="' + sc + '">' + pos.side.toUpperCase() + '</span> ' + sym + ' @ ' + pos.entry + '</div>' +
          '<div><span class="pos-lbl">UNREAL </span><span class="' + pc(pos.unrealized_pnl) + '">' + fmt(pos.unrealized_pnl) + '</span></div>' +
          '<div><span class="pos-lbl">LVG </span>' + pos.leverage + 'x' +
          (pos.market_state ? ' <span class="pos-lbl">STATE </span>' + pos.market_state.toUpperCase() : '') + '</div>' +
          (pos.peak_pct != null ? '<div><span class="pos-lbl">PEAK </span>' + pos.peak_pct.toFixed(1) + '%</div>' : '') +
          (pos.rage ? '<div class="rage-on blink">!! RAGE ACTIVE !!</div>' : '') +
          '</div>';
      }
    });

    const wr = b.winrate != null ? b.winrate : 0;

    html += '<div class="bot-card card ' + (isActive ? 'active-card' : '') + '">' +
      '<div class="card-header"><span>' + name + '</span>' +
      (isActive ? '<span class="blink">&#9654;</span>' : '<span style="color:#666;">&#9632;</span>') +
      '</div><div class="card-body">' +
      '<div class="bot-stat"><span>P&amp;L</span><span class="' + pc(b.pnl) + '">' + fmt(b.pnl) + '</span></div>' +
      '<div class="bot-stat"><span>TRADES</span><span>' + b.trades + '</span></div>' +
      '<div class="bot-stat"><span>W / L</span><span>' + b.wins + ' / ' + (b.trades - b.wins) + '</span></div>' +
      '<div class="bot-stat"><span>WIN RATE</span><span>' + (b.winrate != null ? b.winrate.toFixed(0) + '%' : '---') + '</span></div>' +
      '<div class="bot-winbar"><div class="bot-winbar-fill" style="width:' + wr + '%"></div></div>' +
      posHtml +
      '</div></div>';
  });
  grid.innerHTML = html;
}

// ===== POSITIONS =====
function renderPositions(positions) {
  const panel = document.getElementById('posPanel');
  const body = document.getElementById('posBody');
  const keys = Object.keys(positions);
  if (!keys.length) { panel.style.display = 'none'; return; }
  panel.style.display = '';

  let html = '';
  keys.forEach(key => {
    const p = positions[key];
    const parts = key.split(':');
    html += '<div class="pos-row">' +
      '<span><span class="pos-lbl">BOT </span>' + (parts[0]||'?') + '</span>' +
      '<span><span class="pos-lbl">SYM </span>' + (parts[1]||'?') + '</span>' +
      '<span class="' + (p.side==='buy'?'pnl-pos':'pnl-neg') + '">' + p.side.toUpperCase() + '</span>' +
      '<span><span class="pos-lbl">ENTRY </span>' + p.entry + '</span>' +
      '<span><span class="pos-lbl">NOW </span>' + p.current_price + '</span>' +
      '<span class="' + pc(p.unrealized_pnl) + '"><span class="pos-lbl">P&amp;L </span>' + fmt(p.unrealized_pnl) + '</span>' +
      '<span><span class="pos-lbl">LVG </span>' + p.leverage + 'x</span>' +
      '</div>';
  });
  body.innerHTML = html;
}

// ===== TRADES =====
function renderTrades(trades) {
  const list = document.getElementById('tradeList');
  document.getElementById('tradeCount').textContent = trades.length + ' ENTRIES';
  if (!trades.length) {
    list.innerHTML = '<div style="padding:12px;color:#888;font-size:0.65rem;text-align:center;">NO TRADES RECORDED</div>';
    return;
  }

  let html = '';
  trades.forEach((t, i) => {
    const isNew = i === 0 && prevTradeCount < trades.length;
    html += '<div class="trade-row' + (isNew ? ' trade-new' : '') + '">' +
      '<span class="trade-time">' + (t.time || '--') + '</span>' +
      '<span class="trade-bot">' + (t.bot || '?') + '</span>' +
      '<span class="trade-side ' + (t.side || '') + '">' + ((t.side||'?').toUpperCase()) + '</span>' +
      '<span class="trade-sym">' + (t.sym || '?') + '</span>' +
      '<span class="trade-price">$' + (t.price || '?') + '</span>' +
      '<span class="trade-fee">-$' + (t.fee != null ? t.fee.toFixed(2) : '?') + '</span>' +
      (t.rage ? '<span class="trade-rage blink">RAGE</span>' : '') +
      '</div>';
  });
  list.innerHTML = html;
}

// ===== POLL =====
async function poll() {
  try {
    const res = await fetch(API_BASE + '/api/gmx/state', { signal: AbortSignal.timeout(5000) });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('statusDot').classList.add('offline');
    connected = false;
  }
}

poll();
setInterval(poll, POLL_MS);

// --- OVERRIDE ---
async function override(action, coin, side) {
  try {
    const r = await fetch(API_BASE + '/api/override', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action, coin, side})
    });
    const d = await r.json();
    if (d.status === 'ok') {
      document.body.classList.remove('flash-trade');
      void document.body.offsetWidth;
      document.body.classList.add('flash-trade');
      setTimeout(() => document.body.classList.remove('flash-trade'), 400);
    }
  } catch(e) {
    console.error('Override failed:', e);
  }
}
